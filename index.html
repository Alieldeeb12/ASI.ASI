<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASI</title>
    
    <!-- Icon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22 font-family=%22Arial%22 font-weight=%22bold%22>ASI</text></svg>">

    <style>
        :root {
            --bg: #f3f3f3; --container-bg: #ffffff; --input-bg: rgba(255, 255, 255, 0.7);
            --text: #000000; --text-sec: #5d5d5d; --border: #e5e5e5;
            --accent: #0067c0; --accent-hover: #005aab; --modal-overlay: rgba(0,0,0,0.4);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #202020; --container-bg: #2c2c2c; --input-bg: rgba(255,255,255,0.06);
                --text: #ffffff; --text-sec: #a1a1a1; --border: rgba(255,255,255,0.1);
                --accent: #4cc2ff; --accent-hover: #37b0f0; --modal-overlay: rgba(0,0,0,0.6);
            }
        }
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: var(--bg); font-family: "Segoe UI", sans-serif; color: var(--text); overflow: hidden; }
        
        .main-container { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .label { font-family: 'Consolas', monospace; font-size: 14px; color: var(--text-sec); letter-spacing: 2px; }
        .win11-input { width: 220px; height: 40px; padding: 0 12px; font-size: 20px; letter-spacing: 4px; text-align: center; color: var(--text); background: var(--input-bg); border: 1px solid var(--border); border-bottom: 2px solid var(--text-sec); border-radius: 4px; outline: none; transition: 0.2s; }
        .win11-input:focus { border-bottom: 2px solid var(--accent); }
        
        /* CHANGED: display is now block by default so it doesn't disappear */
        #mainAsiBtn { background: var(--accent); color: white; border: none; padding: 8px 30px; border-radius: 4px; font-size: 14px; cursor: pointer; transition: 0.2s; display: block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); backdrop-filter: blur(10px); justify-content: center; align-items: center; z-index: 100; }
        .menu-content { background: var(--container-bg); width: 320px; padding: 24px; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .asi-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--input-bg); border-radius: 4px; margin-bottom: 8px; font-size: 14px; border: 1px solid var(--border); }
        .btn-del { color: #ff4d4d; background: none; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        .create-input { width: 92%; padding: 10px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-bottom: 10px; outline: none; }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="label">INPUT ASI</div>
        <input type="text" class="win11-input" id="mainInput" maxlength="6" placeholder="000000" inputmode="numeric">
        <button id="mainAsiBtn" onclick="toggleModal()">asi</button>
    </div>

    <div class="modal" id="asiModal">
        <div class="menu-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <span style="font-weight:bold; font-family: Arial; font-size: 20px;">ASI</span>
                <span style="cursor:pointer" onclick="toggleModal()">&times;</span>
            </div>
            
            <div id="myAsiList"></div>

            <div id="createSection" style="border-top: 1px solid var(--border); padding-top: 15px; margin-top:15px;">
                <input type="text" id="newCode" class="create-input" placeholder="6-Digit Number" maxlength="6">
                <input type="text" id="newUrl" class="create-input" placeholder="Link (e.g. google.com)">
                <button style="width:100%; background:var(--accent); color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;" onclick="saveToCloud()">Confirm & Create</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, getDocs, query, where, getCountFromServer } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Your Firebase Keys
        const firebaseConfig = {
            apiKey: "AIzaSyBvqOBz7B65Pgx1dR63m4sb3PlXATn4C0Y",
            authDomain: "asiasi-1a17a.firebaseapp.com",
            projectId: "asiasi-1a17a",
            storageBucket: "asiasi-1a17a.firebasestorage.app",
            messagingSenderId: "257556158133",
            appId: "1:257556158133:web:6cc48410e8a761ceaad0fc",
            measurementId: "G-0YSX5XCBR3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const GLOBAL_LIMIT = 100; 
        let myCodes = JSON.parse(localStorage.getItem('myAsis')) || [];
        let browserPass = localStorage.getItem('browserPass') || Math.random().toString(36).slice(2);
        localStorage.setItem('browserPass', browserPass);

        async function updateButtonVisibility() {
            const btn = document.getElementById('mainAsiBtn');
            try {
                const coll = collection(db, "asis");
                const snapshot = await getCountFromServer(coll);
                const total = snapshot.data().count;
                
                // Only hide the button if you have NO codes AND the world is full
                if (myCodes.length === 0 && total >= GLOBAL_LIMIT) {
                    btn.style.display = 'none';
                } else {
                    btn.style.display = 'block';
                }
            } catch (e) {
                // If database fails, keep button visible so you can at least try to use it
                btn.style.display = 'block';
            }
        }
        updateButtonVisibility();

        window.toggleModal = () => {
            const modal = document.getElementById('asiModal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
            render();
        };

        window.saveToCloud = async () => {
            if (myCodes.length >= 3) return alert("You personally can only own 3 codes.");
            const code = document.getElementById('newCode').value;
            let url = document.getElementById('newUrl').value.trim().toLowerCase();

            if (code.length === 6 && url) {
                if (!url.startsWith('http')) url = 'https://' + url;

                try {
                    const q = query(collection(db, "asis"), where("url", "==", url));
                    const querySnapshot = await getDocs(q);
                    if (!querySnapshot.empty) return alert("This link is already taken!");

                    const check = await getDoc(doc(db, "asis", code));
                    if (check.exists()) return alert("This code is already taken!");

                    await setDoc(doc(db, "asis", code), { url: url, pass: browserPass });
                    myCodes.push({code, url});
                    localStorage.setItem('myAsis', JSON.stringify(myCodes));
                    
                    document.getElementById('newCode').value = '';
                    document.getElementById('newUrl').value = '';
                    render();
                    updateButtonVisibility();
                    toggleModal();
                } catch(e) {
                    alert("Error: Check if your Firestore 'Test Mode' is enabled!");
                }
            }
        };

        window.deleteCode = async (code, index) => {
            try {
                await deleteDoc(doc(db, "asis", code));
                myCodes.splice(index, 1);
                localStorage.setItem('myAsis', JSON.stringify(myCodes));
                render();
                updateButtonVisibility();
            } catch(e) {
                alert("Permission denied.");
            }
        };

        document.getElementById('mainInput').addEventListener('input', async function() {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value.length === 6) {
                const docSnap = await getDoc(doc(db, "asis", this.value));
                if (docSnap.exists()) {
                    window.location.href = docSnap.data().url;
                } else {
                    alert("INVALID ASI");
                    this.value = '';
                }
            }
        });

        function render() {
            const list = document.getElementById('myAsiList');
            document.getElementById('createSection').style.display = (myCodes.length >= 3) ? 'none' : 'block';
            list.innerHTML = myCodes.map((item, index) => `
                <div class="asi-item">
                    <span style="font-family: Consolas;">${item.code}</span>
                    <button class="btn-del" onclick="deleteCode('${item.code}', ${index})">DELETE</button>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
